<section class="animate-fade">
  <div class="summary-box">
    <h3>解答・解説</h3>
    <p>すべての目の出方は \( 6 \times 6 = 36 \) 通りあります。</p>
    <p>和が7になる組み合わせは：<br>
    \( (1, 6), (2, 5), (3, 4), (4, 3), (5, 2), (6, 1) \) の \( 6 \) 通り。</p>
    
    <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 15px 0; text-align: center;">
      <p style="margin: 0; font-size: 1.1rem; color: #7f8c8d;">求める確率は</p>
      <div style="font-size: 1.8rem; margin: 10px 0;">
        \[ P(A) = \frac{6}{36} = \frac{1}{6} \]
