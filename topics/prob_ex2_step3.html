  <div class="summary-box">
    <h3>解答・解説</h3>
    <p>「少なくとも1個は1」の余事象は、<strong>「2個とも1以外の目（2〜6）が出る」</strong>ことです。</p>
    <ul>
      <li>2個とも1以外の目が出る確率は：
        <div style="font-size: 1.3rem; margin: 10px 0; text-align: center;">
          \[ \frac{5}{6} \times \frac{5}{6} = \frac{25}{36} \]
        </div>
      </li>
    </ul>
    <p>求める確率は、\( 1 \) からこの余事象の確率を引いて：</p>
    <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 15px 0; text-align: center;">
      <div style="font-size: 1.5rem;">
        \[ 1 - \frac{25}{36} = \frac{11}{36} \]
      </div>
    </div>
  </div>
