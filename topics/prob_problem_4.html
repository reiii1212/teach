    <h3>問題</h3>
    <p>赤玉3個、白玉2個が入った袋から同時に2個の玉を取り出すとき、2個とも赤玉である確率は？</p>
    
    <div style="display: flex; align-items: center; justify-content: center; margin: 30px 0;">

    </div>
    <div id="hint2" class="hint-content">
      3個の赤玉から2個選ぶ組み合わせ（$_3C_2$）は何通りですか？
    </div>
    <div id="hint3" class="hint-content">
      確率 = （赤玉2個の組み合わせ）÷（全体の組み合わせ）
