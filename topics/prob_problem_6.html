<section class="animate-fade">
  <div class="step-card">
    <h3>問題</h3>
    <p>ジョーカーを除く52枚のトランプから1枚引くとき、それが絵札（J, Q, K）である確率は？</p>
    
    <div style="display: flex; align-items: center; justify-content: center; margin: 30px 0;">
      答え：
      <div class="fraction-input">
        <input type="text" id="num-input" placeholder="分子">
        <div class="fraction-line"></div>
        <input type="text" id="den-input" placeholder="分母">
      </div>
      <button onclick="checkFractionAnswer(3, 13)" style="margin-left: 20px; padding: 10px 20px; cursor: pointer;">丸つけ</button>
    </div>
    
    <div id="feedback" style="text-align: center; font-weight: bold; min-height: 2rem;"></div>
  </div>

<div class="hint-container">
  <div class="hint-btn-group">
    <button class="hint-btn" onclick="toggleHint('hint1')">💡 ヒント1</button>
    <button class="hint-btn" onclick="toggleHint('hint2')">💡 ヒント2</button>
    <button class="hint-btn" onclick="toggleHint('hint3')">💡 ヒント3</button>
  </div>
  <div id="hint1" class="hint-content">
    トランプの全枚数は52枚です。
  </div>
  <div id="hint2" class="hint-content">
    絵札（J, Q, K）は1つのマークにつき3枚あります。マークは4つ（スペード、ハート、ダイヤ、クラブ）あるので、全部で何枚でしょう？
  </div>
  <div id="hint3" class="hint-content">
    絵札は全部で $3 \times 4 = 12$ 枚あります。確率は $\frac{12}{52}$ です。約分しましょう！
  </div>
